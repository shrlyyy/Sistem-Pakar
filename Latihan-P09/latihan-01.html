<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Pakar Diagnosa Tifus (Ambang Batas 80%)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; max-width: 850px; margin: 20px auto; padding: 20px; background-color: #f0f2f5; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 10px; margin-top: 0; }
        .info-box { background: #e7f3ff; color: #0c5460; padding: 10px 15px; border-radius: 6px; margin-bottom: 20px; font-size: 0.9em; border-left: 5px solid #3498db; }
        .input-group { margin-bottom: 15px; display: flex; align-items: center; background: #f9f9f9; padding: 10px; border-radius: 6px; border: 1px solid #eee; }
        label { flex: 1; font-weight: bold; color: #34495e; }
        input[type="number"] { width: 90px; padding: 8px; border: 2px solid #ddd; border-radius: 6px; text-align: center; font-size: 1em; }
        button { background: #2ecc71; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 18px; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #27ae60; transform: translateY(-2px); }
        
        #resultArea { margin-top: 25px; display: none; border-radius: 8px; overflow: hidden; border: 1px solid #ddd; }
        .result-header { padding: 20px; font-size: 1.4em; text-align: center; font-weight: bold; }
        .success { background: #d4edda; color: #155724; border-bottom: 1px solid #c3e6cb; }
        .danger { background: #f8d7da; color: #721c24; border-bottom: 1px solid #f5c6cb; }
        
        .log-section { padding: 20px; background: #ffffff; }
        .math-box { font-family: 'Courier New', Courier, monospace; background: #2d3436; color: #dfe6e9; padding: 15px; border-radius: 6px; font-size: 0.95em; line-height: 1.8; }
        .math-box b { color: #fab1a0; }
        .conclusion-text { margin-top: 15px; font-size: 1.1em; color: #2c3e50; padding: 15px; background: #f8f9fa; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistem Pakar Diagnosa Tifus</h2>
    <div class="info-box">
        <b>Aturan Sistem:</b> Pasien dinyatakan <b>Positif</b> hanya jika tingkat keyakinan (CF) mencapai minimal <b>80% (0.80)</b>.
    </div>
    
    <div class="input-group">
        <label>Demam Tinggi (G01):</label>
        <input type="number" id="g1" step="0.1" min="0" max="1" value="">
    </div>
    <div class="input-group">
        <label>Sakit Perut (G02):</label>
        <input type="number" id="g2" step="0.1" min="0" max="1" value="">
    </div>
    <div class="input-group">
        <label>Lemas (G03):</label>
        <input type="number" id="g3" step="0.1" min="0" max="1" value="">
    </div>
    <div class="input-group">
        <label>Mual (G04):</label>
        <input type="number" id="g4" step="0.1" min="0" max="1" value="">
    </div>
    <div class="input-group">
        <label>Tidak Nafsu Makan (G05):</label>
        <input type="number" id="g5" step="0.1" min="0" max="1" value="">
    </div>

    <button onclick="hitungDiagnosa()">Proses Diagnosa</button>

    <div id="resultArea">
        <div id="resultHeader" class="result-header"></div>
        <div class="log-section">
            <h4>Proses Perhitungan Sistem:</h4>
            <div id="logProses" class="math-box"></div>
            <div id="kesimpulanFinal" class="conclusion-text"></div>
        </div>
    </div>
</div>

<script>
function hitungDiagnosa() {
    // 1. Input Nilai Gejala
    const g1 = parseFloat(document.getElementById('g1').value);
    const g2 = parseFloat(document.getElementById('g2').value);
    const g3 = parseFloat(document.getElementById('g3').value);
    const g4 = parseFloat(document.getElementById('g4').value);
    const g5 = parseFloat(document.getElementById('g5').value);

    // 2. CF Pakar dari Aturan
    const cfPakar1 = 0.8;
    const cfPakar2 = 0.7;

    // 3. Langkah 1: Aturan 1 (AND menggunakan MIN)
    let minG1 = Math.min(g1, g2);
    let cf1 = minG1 * cfPakar1;

    // 4. Langkah 2: Aturan 2 (AND menggunakan MIN)
    let minG2 = Math.min(g3, g4, g5);
    let cf2 = minG2 * cfPakar2;

    // 5. Langkah 3: Gabungkan CF (Combining Evidence)
    let cfTotal = cf1 + (cf2 * (1 - cf1));
    let persentase = (cfTotal * 100).toFixed(2);

    // 6. UI Output
    const resultArea = document.getElementById('resultArea');
    const resultHeader = document.getElementById('resultHeader');
    const logProses = document.getElementById('logProses');
    const kesimpulanFinal = document.getElementById('kesimpulanFinal');

    resultArea.style.display = 'block';

    // LOGIKA PERBAIKAN: Threshold ketat 80% (0.8)
    if (cfTotal >= 0.8) {
        resultHeader.className = "result-header success";
        resultHeader.innerHTML = "HASIL: POSITIF TIFUS";
        kesimpulanFinal.innerHTML = `Berdasarkan gejala yang dialami, pasien dinyatakan <b>Positif Tifus</b> dengan tingkat keyakinan <b>${persentase}%</b>.`;
    } else {
        resultHeader.className = "result-header danger";
        resultHeader.innerHTML = "HASIL: NEGATIF TIFUS";
        kesimpulanFinal.innerHTML = `Meskipun ditemukan gejala, tingkat keyakinan hanya <b>${persentase}%</b>. Karena di bawah ambang batas 80%, pasien dinyatakan <b>Negatif</b> atau diperlukan pemeriksaan lebih lanjut.`;
    }

    // Tampilkan Log Langkah-Langkah
    logProses.innerHTML = `
        <b>Langkah 1 (Aturan 1):</b><br>
        min(${g1}, ${g2}) = ${minG1}<br>
        CF1 = ${minG1} * ${cfPakar1} = <b>${cf1.toFixed(4)}</b><br><br>

        <b>Langkah 2 (Aturan 2):</b><br>
        min(${g3}, ${g4}, ${g5}) = ${minG2}<br>
        CF2 = ${minG2} * ${cfPakar2} = <b>${cf2.toFixed(4)}</b><br><br>

        <b>Langkah 3 (Kombinasi):</b><br>
        CF_gabung = ${cf1.toFixed(4)} + ${cf2.toFixed(4)} * (1 - ${cf1.toFixed(4)})<br>
        CF_gabung = <b>${cfTotal.toFixed(4)}</b> (${persentase}%)
    `;
    
    resultArea.scrollIntoView({ behavior: 'smooth' });
}
</script>

</body>
</html>
